name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle Wrapper JAR
      run: |
        cd gradle/wrapper
        wget https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        find gradle-8.2 -name "gradle-wrapper.jar" -exec cp {} . \;
        rm -rf gradle-8.2-bin.zip gradle-8.2/

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Android App
      run: ./gradlew assembleDebug

    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cryptopro-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cryptopro-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
