name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle distribution
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O gradle.zip
        unzip -q gradle.zip
        chmod +x gradle-8.2/bin/gradle

    - name: Build with downloaded Gradle
      run: ./gradle-8.2/bin/gradle --no-daemon assembleDebug --stacktrace

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: cryptopro-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cryptopro-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
    - name: Upload APK to artifacts
      uses: actions/upload-artifact@v4
      with:
        name: cryptopro-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
